<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Blocket League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="hud">
      <div id="hud-top">
        <div id="timer">5:00</div>
        <div id="scoreboard">
          <span id="score-blue" class="score blue">0</span>
          <span class="score-divider">-</span>
          <span id="score-orange" class="score orange">0</span>
        </div>
      </div>
      <div id="hud-bottom">
        <div id="boost-container">
          <svg id="boost-meter" viewBox="0 0 120 120">
            <circle class="boost-bg" cx="60" cy="60" r="52" />
            <circle id="boost-arc" class="boost-fill" cx="60" cy="60" r="52" />
            <text class="boost-text" x="60" y="64">33</text>
          </svg>
        </div>
      </div>
      <div id="speed-bar">
        <div id="speed-fill"></div>
      </div>
    </div>
    <div id="overlay">
      <div id="countdown"></div>
      <div id="goal-text"></div>
      <div id="demo-text"></div>
      <div id="status-text"></div>
    </div>
    <div id="controls-hint">
      <p>WASD - Drive | SPACE - Jump | SHIFT - Boost | C - Ball Cam</p>
    </div>
    <div id="lobby">
      <div class="lobby-title-wrap">
        <span class="lobby-title">BLOCKET LEAGUE</span>
        <span class="lobby-title lobby-title-reflect">BLOCKET LEAGUE</span>
      </div>
      <div class="lobby-buttons">
        <button id="btn-singleplayer" class="lobby-btn">Play vs AI</button>
        <button id="btn-multiplayer" class="lobby-btn lobby-btn-online">Play Online</button>
      </div>
      <div id="car-selector">
        <canvas id="car-preview"></canvas>
        <div class="car-selector-buttons">
          <button id="btn-randomize" class="lobby-btn">Randomize</button>
          <button id="btn-letsgo" class="lobby-btn">Let's Go</button>
        </div>
        <button id="btn-back" class="lobby-btn lobby-btn-back">Back</button>
      </div>
    </div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
