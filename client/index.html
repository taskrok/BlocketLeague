<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <link rel="manifest" href="manifest.json" />
  <title>Blocket League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="hud">
      <div id="hud-top">
        <div id="timer">5:00</div>
        <div id="scoreboard">
          <span id="score-blue" class="score blue">0</span>
          <span class="score-divider">-</span>
          <span id="score-orange" class="score orange">0</span>
        </div>
      </div>
      <div id="hud-bottom">
        <div id="boost-container">
          <svg id="boost-meter" viewBox="0 0 120 120">
            <circle class="boost-bg" cx="60" cy="60" r="52" />
            <circle id="boost-arc" class="boost-fill" cx="60" cy="60" r="52" />
            <text class="boost-text" x="60" y="64">33</text>
          </svg>
        </div>
      </div>
      <div id="speed-bar">
        <div id="speed-fill"></div>
      </div>
    </div>
    <div id="overlay">
      <div id="countdown"></div>
      <div id="goal-text"></div>
      <div id="demo-text"></div>
      <div id="status-text"></div>
    </div>
    <div id="controls-hint">
      <p>WASD - Drive | SPACE - Jump | SHIFT - Boost | C - Ball Cam | J/L - Look</p>
    </div>
    <div id="lobby">
      <div id="loading-screen">
        <span class="loading-text">Loading models...</span>
        <div class="loading-bar">
          <div class="loading-fill" id="loading-fill"></div>
        </div>
      </div>
      <div class="lobby-title-wrap">
        <span class="lobby-title">BLOCKET LEAGUE</span>
        <span class="lobby-title lobby-title-reflect">BLOCKET LEAGUE</span>
      </div>
      <div class="lobby-buttons">
        <button id="btn-singleplayer" class="lobby-btn">Play vs AI</button>
        <button id="btn-multiplayer" class="lobby-btn lobby-btn-online">Play Online</button>
      </div>
      <div id="room-lobby" style="display:none;">
        <div class="room-lobby-options">
          <button id="btn-create-room" class="lobby-btn lobby-btn-online">Create Room</button>
          <div class="room-join-row">
            <input id="room-code-input" type="text" maxlength="4" placeholder="CODE"
                   class="room-code-input" autocomplete="off" spellcheck="false" />
            <button id="btn-join-room" class="lobby-btn lobby-btn-online">Join</button>
          </div>
        </div>
        <div id="mode-selector" style="display:none;">
          <span class="room-label">Choose Mode</span>
          <div class="mode-buttons">
            <button id="btn-mode-1v1" class="lobby-btn">1v1</button>
            <button id="btn-mode-2v2" class="lobby-btn lobby-btn-online">2v2</button>
          </div>
        </div>
        <div id="waiting-room" style="display:none;">
          <span class="room-label">Room Code</span>
          <div id="room-code-display" class="room-code-display">----</div>
          <div id="room-status" class="room-status">Waiting for players...</div>
        </div>
        <button id="btn-room-back" class="lobby-btn lobby-btn-back">Back</button>
      </div>
      <div id="car-selector">
        <div class="car-model-nav">
          <button id="btn-prev-model" class="lobby-btn lobby-btn-nav">&lt;</button>
          <span id="car-model-name" class="car-model-label">Loading...</span>
          <button id="btn-next-model" class="lobby-btn lobby-btn-nav">&gt;</button>
        </div>
        <canvas id="car-preview"></canvas>
        <div class="car-selector-buttons">
          <button id="btn-randomize" class="lobby-btn">Random Colors</button>
          <button id="btn-reset-colors" class="lobby-btn lobby-btn-back">Reset Colors</button>
          <button id="btn-letsgo" class="lobby-btn">Let's Go</button>
        </div>
        <button id="btn-back" class="lobby-btn lobby-btn-back">Back</button>
      </div>
    </div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
